<!--
Q9. Create search forms that allow
users to search directly on Google
and Reddit using the form action
attribute and input fields.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Qs 9</title>
</head>
<body>
    <form action="https://www.google.com/search">
        <input type="text" name="q" placeholder="Search in Google">
        <button>Search</button>
    </form>

    <br>

    <form action ="https://www.reddit.com/search/">
        <input type="text" name="q" placeholder="search in reddit">
        <button>Search</button>
    </form>
</body>
</html>
