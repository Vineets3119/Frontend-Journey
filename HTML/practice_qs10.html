<!--
Q10. Create a registration form using
text inputs, a dropdown menu,
a checkbox for terms and conditions,
and a submit button.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Qs 10</title>
</head>
<body>
    <form action="/server">

    <div>
        <h3>Registration Form</h3>
        <input type="text" placeholder="First name" name="First name">
        <input type="text" placeholder="Last name " name="last name">
    </div>

    
    <div>
        <label for="gender">PLease Select Gender</label>
        <select name="Gender" id="gender">
            <option value="male" selected>Male</option>
            <option value="female">Female</option>
            <option value="others">Others</option>
        </select>
    </div>

    <div>
        <label for="terms">Do you agree to all terms of serives ? </label>
        <input type="checkbox" id="terms" name="terms_of_services" checked >Yes , I agree 
    </div>
    
    <div>
        <button>Register</button>
    </div>
    
    
    </form>
</body>
</html>
