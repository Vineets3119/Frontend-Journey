<!--
Q2. Create an unordered list of fruits.
Add links for each fruit image using
the anchor (<a>) tag.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice qs 2</title>
</head>
<body>
    <p>List of Fruits:</p>
    <ul>
        <li>Apple <a href="apple.jpg" alt="Apple Image" height="100px" width="100px"> see an apple</a></li>
        <li>Mango <a href="mango.jpeg" alt="Mango Image" height="100px" width="100px"> see a mango</a></li>
        <li>Orange <a href="orange.png" alt="Orange Image" height="100px" width="100px"> see an orange</a></li>
    </ul>
</body>
</html>
