<!--
Q13. Create a form that includes
radio buttons for fruit selection,
a dropdown menu for profession,
a range slider for volume control,
and a textarea for user feedback.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Qs 13</title>
</head>
<body>
    <form action="/server">
        <input type="radio" name="Fruit" id="apple" value="apple">
        <label for="apple">Apple</label>
        <input type="radio" name="Fruit" id="banana" value="banana">
        <label for="banana">Banana</label>
        <input type="radio" name="Fruit" id="mango" value="mango">
        <label for="mango">Mango</label>
        <button>Submit</button>


        <br><br>
        <div>
            Choose your options :
            <select name="profession" id="profession">
                <option value="">select your profession</option>

                <option value="stu">Student</option>
                <option value="dev">Developer</option>

            </select>
        </div>
        <br><br>
        <div>
            <label for="vol">Select your volume level </label>
            <input type="range" id="vol" name="vol" min="0" max="100" step="10">
            <button>Submit</button>
        </div>
        <div>
            <label for="feedback">Give your valuable feedback :</label>
            <textarea name="feedback" id="feedback" placeholder="Write your feedback here"></textarea>
            <button>submit</button>
        </div>
    </form>
</body>
</html>
