<!--
Q1. Create a webpage that displays the names
of Avengers along with their real identities
using heading (<h1>, <h2>), paragraph (<p>),
and bold (<b>) tags.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice qs 1</title>
</head>
<body>
    <h1>Avengers</h1>
    
    <h2>Iron Man</h2>
    <p>Also goes by the name <b>Tony Stark</b>.</p>
    
    <h2>Captain America</h2>
    <p>Also goes by the name <b>Steve Rogers</b>.</p>
    
    <h2>Hulk</h2>
    <p>Also goes by the name <b>Bruce Banner</b>.</p>
    
</body>
</html>
