<!--
Q12. Create a feedback form using
text input, radio buttons, dropdown,
textarea, checkbox, and submit button.
Collect user details such as name,
gender, country, and message.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Qs 12</title>
</head>
<body>
    <form action="/server">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="username">
        </div>
        <div>
            <label for="gender">Sex:</label>
            <input type="radio" id="gender" name="sex" value="male">
            <label for="male">Male</label>
            <input type="radio" id="gender" name="sex" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <label for="country">Country:</label>
            <select name="country" id="country" >
                <option>Select an option</option>
                <option value="India">India</option>
                <option value="Nepal">Nepal</option>
                <option value="USA">USA</option>
                <option value="Canada">Canada</option>
            </select>
        </div>
        <div>
            <label for="message">Message:</label>
            <br>
            <textarea name="message" id="message" cols="30" rows="4"></textarea>
        </div>
        <div>
            <input type="checkbox" id="suscribe" name="suscribe">
            <label for="suscribe">Subscribe?</label>
        </div>
        <div>
            <button>Submit</button>
        </div>
    </form>
</body>
</html>
